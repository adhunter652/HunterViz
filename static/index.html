<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HunterViz</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, sans-serif;
      background: #fafafa;
    }
    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      padding: 1rem 1.5rem;
      gap: 0.75rem;
    }
    .header a {
      color: #333;
      text-decoration: none;
      padding: 0.5rem 1rem;
      border-radius: 4px;
    }
    .header a:hover { background: #eee; }
    .header .signin { font-weight: 500; }
    .header .signup { background: #111; color: #fff; }
    .header .signup:hover { background: #333; color: #fff; }
    .center {
      text-align: center;
      padding: 2rem;
    }
    .brand { font-size: 2rem; font-weight: 700; margin-bottom: 2rem; letter-spacing: -0.02em; }
    .contact-btn {
      display: inline-block;
      padding: 0.875rem 2rem;
      background: #111;
      color: #fff;
      text-decoration: none;
      border-radius: 6px;
      font-weight: 500;
    }
    .contact-btn:hover { background: #333; }
  </style>
</head>
<body>
  <header class="header">
    <a href="/app/login" class="signin">Sign in</a>
    <a href="/app/signup" class="signup">Sign up</a>
  </header>
  <main class="center">
    <h1 class="brand">HunterViz</h1>
    <a href="mailto:contact@hunterviz.com" class="contact-btn">Contact me</a>
  </main>
</body>
</html>
