<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>HunterViz — Data management that works</title>
        <link rel="icon" type="image/png" href="assets/favicon.png" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap"
            rel="stylesheet"
        />
        <style>
            :root {
                --bg: #f8fafc;
                --surface: #ffffff;
                --header-bg: rgba(248, 250, 252, 0.9);
                --text: #0f172a;
                --text-muted: #475569;
                --accent: #2563eb;
                --accent-hover: #1d4ed8;
                --accent-tint: rgba(59, 130, 246, 0.15);
                --border: rgba(15, 23, 42, 0.08);
            }
            * {
                box-sizing: border-box;
            }
            body {
                margin: 0;
                min-height: 100vh;
                display: flex;
                flex-direction: column;
                font-family:
                    "DM Sans",
                    system-ui,
                    -apple-system,
                    sans-serif;
                background: var(--bg);
                color: var(--text);
                line-height: 1.5;
            }
            .header {
                flex-shrink: 0;
                height: 150px;
                display: flex;
                justify-content: space-between;
                align-items: start;
                padding: 1rem 1.5rem;
                background: linear-gradient(
                    to bottom,
                    #bfdbfe 0%,
                    var(--bg) 100%
                );
                z-index: 100;
            }
            .logo-wrap {
                display: flex;
                align-items: center;
                gap: 0.75rem;
                text-decoration: none;
                color: var(--text);
            }
            .logo-wrap .logo-img {
                height: 32px;
                width: auto;
                object-fit: contain;
                border-radius: 6px;
                flex-shrink: 0;
            }
            .logo-wrap .company-name-img {
                height: 24px;
                width: auto;
                display: block;
            }
            .nav {
                display: flex;
                align-items: center;
                gap: 0.5rem;
            }
            .nav a {
                color: var(--text-muted);
                text-decoration: none;
                padding: 0.4rem 0.875rem;
                border-radius: 6px;
                font-size: 0.875rem;
                font-weight: 500;
            }
            .nav a:hover {
                color: var(--text);
                background: var(--accent-tint);
            }
            .nav .signup {
                background: var(--accent);
                color: #fff;
            }
            .nav .signup:hover {
                background: var(--accent-hover);
                color: #fff;
            }
            main {
                flex: 1;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 2rem 1.5rem;
                background: var(--bg);
            }
            .hero {
                max-width: 720px;
                text-align: center;
            }
            .hero h1 {
                font-size: clamp(2rem, 5vw, 3rem);
                font-weight: 700;
                letter-spacing: -0.03em;
                margin: 0 0 1rem 0;
                line-height: 1.15;
            }
            .hero p {
                font-size: 1.125rem;
                color: var(--text-muted);
                margin: 0 0 2rem 0;
            }
            .cta {
                display: inline-flex;
                align-items: center;
                gap: 0.5rem;
                padding: 0.875rem 1.75rem;
                background: var(--accent);
                color: #fff;
                text-decoration: none;
                border-radius: 8px;
                font-weight: 600;
                font-size: 1rem;
            }
            .cta:hover {
                background: var(--accent-hover);
                color: #fff;
            }
            .footer {
                flex-shrink: 0;
                padding: 0.75rem 1.5rem;
                text-align: center;
                color: var(--text-muted);
                font-size: 0.8125rem;
                background: linear-gradient(
                    to bottom,
                    var(--bg) 0%,
                    #e2e8f0 100%
                );
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 0.35rem;
                flex-wrap: wrap;
            }
            .footer-brand {
                height: 1em;
                width: auto;
                vertical-align: middle;
                display: inline-block;
                object-fit: contain;
            }
        </style>
    </head>
    <body>
        <header class="header">
            <a href="/" class="logo-wrap">
                <img
                    src="assets/company-name.png"
                    alt="HunterViz"
                    class="company-name-img"
                />
            </a>
            <nav class="nav">
                <a href="https://app.hunterviz.com/app/login">Sign in</a>
                <a href="https://app.hunterviz.com/app/signup" class="signup">Sign up</a>
            </nav>
        </header>
        <main>
            <section class="hero">
                <h1>Data management that works</h1>
                <p>
                    Streamline your business data with a single dashboard. Get
                    clarity, control, and better decisions.
                </p>
                <a href="https://app.hunterviz.com/app/contact" class="cta">Contact us</a>
            </section>
        </main>
        <footer class="footer">
            <span>&copy; <span id="year"></span></span>
            <img
                src="assets/company-name.png"
                alt="HunterViz"
                class="footer-brand"
            />
            <span>All rights reserved.</span>
        </footer>
        <script>
            document.getElementById("year").textContent =
                new Date().getFullYear();
        </script>
    </body>
</html>
