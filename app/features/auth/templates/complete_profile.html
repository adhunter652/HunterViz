<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Complete Profile — {{ app_name }}</title>
        <link rel="icon" type="image/png" href="/assets/favicon.png" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap"
            rel="stylesheet"
        />
        <style>
            :root {
                --bg: #f8fafc;
                --surface: #ffffff;
                --header-bg: rgba(248, 250, 252, 0.9);
                --text: #0f172a;
                --text-muted: #475569;
                --accent: #2563eb;
                --accent-hover: #1d4ed8;
                --accent-tint: rgba(59, 130, 246, 0.15);
                --border: rgba(15, 23, 42, 0.08);
            }
            * {
                box-sizing: border-box;
            }
            body {
                margin: 0;
                min-height: 100vh;
                display: flex;
                flex-direction: column;
                font-family:
                    "DM Sans",
                    system-ui,
                    -apple-system,
                    sans-serif;
                background: var(--bg);
                color: var(--text);
                line-height: 1.5;
                font-size: 1rem;
            }
            .header {
                flex-shrink: 0;
                height: 150px;
                display: flex;
                justify-content: space-between;
                align-items: start;
                padding: 1rem 1.5rem;
                background: linear-gradient(
                    to bottom,
                    #bfdbfe 0%,
                    var(--bg) 100%
                );
                z-index: 100;
            }
            .logo-wrap {
                display: flex;
                align-items: center;
                gap: 0.75rem;
                text-decoration: none;
                color: var(--text);
            }
            .logo-wrap .company-name-img {
                height: 24px;
                width: auto;
                display: block;
            }
            main {
                flex: 1;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 2rem 1.5rem;
                background: var(--bg);
            }
            .card {
                width: 100%;
                max-width: 400px;
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: 12px;
                padding: 2.5rem;
                box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            }
            .card h1 {
                margin: 0 0 0.5rem 0;
                font-size: 1.5rem;
                font-weight: 600;
                letter-spacing: -0.02em;
                color: var(--text);
                text-align: center;
            }
            .card p.subtitle {
                color: var(--text-muted);
                font-size: 0.875rem;
                text-align: center;
                margin-bottom: 2rem;
            }
            label {
                display: block;
                margin-bottom: 0.5rem;
                font-size: 0.875rem;
                font-weight: 600;
                color: var(--text);
            }
            input {
                width: 100%;
                padding: 0.75rem 1rem;
                margin-bottom: 1.5rem;
                font: inherit;
                font-size: 1rem;
                color: var(--text);
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: 8px;
                transition: border-color 0.2s, box-shadow 0.2s;
            }
            input:focus {
                outline: none;
                border-color: var(--accent);
                box-shadow: 0 0 0 3px var(--accent-tint);
            }
            button[type="submit"] {
                width: 100%;
                padding: 0.875rem;
                background: var(--accent);
                color: #fff;
                border: none;
                border-radius: 8px;
                font-size: 1rem;
                font-weight: 600;
                cursor: pointer;
                transition: background 0.2s;
            }
            button[type="submit"]:hover {
                background: var(--accent-hover);
            }
            .footer {
                flex-shrink: 0;
                padding: 1.5rem;
                text-align: center;
                color: var(--text-muted);
                font-size: 0.8125rem;
                background: var(--bg);
            }
        </style>
    </head>
    <body>
        <header class="header">
            <a href="/" class="logo-wrap">
                <img src="/assets/company-name.png" alt="" class="company-name-img" />
            </a>
        </header>
        <main>
            <div class="card">
                <h1>One last thing</h1>
                <p class="subtitle">Please tell us your company name to finish setting up your account.</p>
                <form action="/api/v1/auth/complete-profile" method="POST">
                    <label for="company_name">Company Name</label>
                    <input type="text" id="company_name" name="company_name" placeholder="e.g. Acme Corp" required autofocus />
                    <button type="submit">Complete Setup</button>
                </form>
            </div>
        </main>
        <footer class="footer">
            <span>&copy; <span id="year"></span> {{ app_name }}. All rights reserved.</span>
        </footer>
        <script>
            document.getElementById("year").textContent = new Date().getFullYear();
        </script>
    </body>
</html>
