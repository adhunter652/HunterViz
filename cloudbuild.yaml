# Build and deploy to Cloud Run on git push.
# Ensure Artifact Registry repo exists, e.g.:
#   gcloud artifacts repositories create docker-repo --repository-format=docker --location=us-central1 --project=hunterviz
#
# Substitution variables (set in trigger or use defaults):
#   _REGION          = us-central1
#   _ARTIFACT_REPO   = docker-repo
#   _SERVICE_NAME    = hunterviz-web
substitutions:
  _REGION: us-central1
  _ARTIFACT_REPO: docker-repo
  _SERVICE_NAME: hunterviz-web

options:
  logging: CLOUD_LOGGING_ONLY

steps:
  # Build the container image from the Dockerfile in this repo
  - name: gcr.io/cloud-builders/docker
    id: build
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_SERVICE_NAME}:${SHORT_SHA}
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_SERVICE_NAME}:latest
      - .
    dir: .

  # Push to Artifact Registry
  - name: gcr.io/cloud-builders/docker
    id: push
    args:
      - push
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_SERVICE_NAME}:${SHORT_SHA}
    waitFor: [build]

  # Deploy to Cloud Run (min instances 0 so service starts on first request to /app/login, /app/signup, /app/contact).
  # Required env vars (SECRET_KEY, CLOUD_RUN_URL, PORT) must be set on the service (e.g. gcloud run services update ... --set-env-vars)
  # or the app will fail startup and the TCP probe on 8080 will fail. See docs/GOOGLE_CLOUD_SETUP.md §3.1–3.3.
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE_NAME}
      - --image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_SERVICE_NAME}:${SHORT_SHA}
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --min-instances=0
    waitFor: [push]

images:
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_SERVICE_NAME}:${SHORT_SHA}
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_SERVICE_NAME}:latest
